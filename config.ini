[General]
; 是否显示托盘图标（1=显示, 0=隐藏）
show_tray_icon=1

[Hotkeys]
; 快捷键定义规则（AHK 修饰符）：
;   ^ = Ctrl    ! = Alt    # = Win    + = Shift
; 修饰符可以组合使用，例如 ^! 表示 Ctrl+Alt
; 按键名称可以是：字母、数字、功能键（F1-F24）、方向键等
; 特殊键：`（反引号，数字 1 左边的键）

; 屏幕切换快捷键（默认 Ctrl+Alt+`）
switch_screen=^!`

[Behavior]
; 光标移动速度（0=瞬间, 1-100=带动画）
move_speed=0
