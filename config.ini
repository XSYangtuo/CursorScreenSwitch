[General]
; 是否显示托盘图标（1=显示, 0=隐藏）
show_tray_icon=1
; 切换后是否显示屏幕参数调试信息（1=显示, 0=隐藏）
show_debug_tip=0
; 切换后是否自动聚焦目标屏幕上的窗口（1=是, 0=否）
focus_on_switch=1

[Hotkeys]
; 快捷键定义规则（AHK 修饰符）：
;   ^ = Ctrl    ! = Alt    # = Win    + = Shift
; 修饰符可以组合使用，例如 ^! 表示 Ctrl+Alt
; 按键名称可以是：字母、数字、功能键（F1-F24）、方向键等
; 特殊键：`（反引号，数字 1 左边的键）

; 屏幕切换快捷键（默认 Ctrl+Alt+`）
switch_screen=^!`

